name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # assume the AWS role via OIDC
  contents: read

env:
  TF_IN_AUTOMATION: "true"

# Never let two applies run against the same state at once.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=tfstate-development-tfstate-488519936220" -backend-config="region=us-east-1"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false